[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
user=user

[program:redis]
command=redis-server --port 6379 --daemonize no
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=user

[program:fastapi]
command=uvicorn backend.app.main:app --host 0.0.0.0 --port 7860
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=user

[program:celery]
command=celery -A backend.app.worker.celery_app worker --loglevel=info
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=user
